<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            max-width: 640px;
            margin: 0 auto;
            padding: 16px;
            color: #333;
        }

        nav {
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }

        nav a {
            margin-right: 16px;
            text-decoration: none;
            color: #555;
        }

        nav a:hover {
            color: #000;
        }

        h1 {
            margin-bottom: 16px;
        }

        form p {
            margin-bottom: 10px;
        }

        form label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
        }

        form input[type="text"],
        form textarea {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button[type="submit"] {
            padding: 6px 18px;
            cursor: pointer;
            border: 1px solid #888;
            border-radius: 4px;
            background: #f0f0f0;
        }

        button[type="submit"]:hover {
            background: #ddd;
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>
    <nav>
        <a href="{% url 'todo-list' %}">首頁</a>
        <a href="{% url 'todo-create' %}">新增 Todo</a>
    </nav>
    {% block content %}{% endblock %}
    {% if message %}<p>{{ message }}</p>{% endif %}
</body>

</html>
